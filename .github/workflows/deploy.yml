name: Build GDExtension

on: [push, pull_request]

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: libhid_ext.dll
          - os: ubuntu-latest
            artifact: libhid_ext.so
          - os: macos-latest
            artifact: libhid_ext.dylib

    steps:
      # v4.2.2+ completely removes the Node 20 deprecation warning
      - name: Checkout Code
        uses: actions/checkout@v4.2.2

      - name: Install Linux Dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev pkg-config

      # Setup MSVC Linker explicitly for Windows
      - name: Setup MSVC
        if: matrix.os == 'windows-latest'
        uses: bus1/common-actions/setup-msvc@v1
        with:
          architecture: x64

      # Pinning Rust compiler avoids the 101 compilation panic
      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.75.0

      - name: Build Extension
        run: cargo build --release

      # v4.6.0+ removes the Node 20 warning for artifacts
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4.6.0
        with:
          name: hid-gd-${{ matrix.os }}
          path: target/release/${{ matrix.artifact }}
